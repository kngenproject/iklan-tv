<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toko Buah ABS — Digital Signage</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="signage-root" id="signage-root">

    <!-- ══ HEADER ══ -->
    <header class="s-header">
        <div class="logo-area">
            <div class="logo-icon">🍉</div>
            <div class="logo-text">
                <h1 class="logo-abs"><span>Buah</span>ABS</h1>
                <div class="logo-tagline">Aneka Buah Segar</div>
            </div>
        </div>
        <div class="header-right">
            <div class="header-badge">🍍 SEGAR<br>BERKUALITAS</div>
            <div class="clock-box">
                <div class="clock-time" id="jam-tv">00:00:00</div>
                <div class="clock-date" id="tanggal-tv">—</div>
            </div>
        </div>
    </header>

    <!-- ══ MAIN CONTENT ══ -->
    <main class="s-main">

        <!-- PANEL KIRI — SLIDESHOW PROMO -->
        <section class="panel-left" aria-label="Slideshow Promo Toko Buah">
            <div class="slide-dots">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
        </section>

        <!-- PANEL KANAN — SIDEBAR -->
        <aside class="panel-right" aria-label="Info Toko">
            <div class="right-top">
                <h3 class="right-top-title">🍍 Toko Buah ABS</h3>
                <div class="qr-box">
                    <div class="qr-placeholder">Scan QR<br>Pesan Online</div>
                </div>
                <p class="qr-label">Hubungi kami via WhatsApp</p>
                <div class="kontak-list">
                    <div class="kontak-item">📱 <span>0813-3352-7527</span></div>
                    <div class="kontak-item">📍 <span>Kepanjen, Malang</span></div>
                    <div class="kontak-item">📧 <span>buahabs@email.com</span></div>
                </div>
            </div>
            <div class="right-middle">
                <!-- Akan diisi oleh JS -->
            </div>
        </aside>
    </main>

    <!-- ══ RUNNING TICKER ══ -->
    <footer class="marquee-wrap">
        <div class="marquee-track" id="marquee-track"></div>
    </footer>

    <!-- Toast Notifikasi -->
    <div class="toast" id="toast">🍍 Promo terbaru!</div>

</div>
<script src="app.js"></script>
</body>
</html>
