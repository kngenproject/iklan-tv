<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Toko Buah ABS - Digital Signage</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Arial', sans-serif;
      background: #000000;
      overflow: hidden;
    }

    .signage-container {
      width: 3840px;
      height: 2160px;
      background: #000000;
      color: white;
      display: grid;
      grid-template-rows: 1fr 2fr 1fr;
      grid-gap: 40px;
      padding: 60px;
    }

    /* Header */
    .header {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      border-left: 12px solid #00d4ff;
      padding-left: 80px;
    }

    .store-name {
      font-size: 120px;
      font-weight: 900;
      letter-spacing: 10px;
      color: #ffffff;
      text-shadow: 0 0 40px rgba(0, 212, 255, 0.6);
      line-height: 0.9;
      margin-bottom: 20px;
    }

    .store-tagline {
      font-size: 80px;
      font-weight: 400;
      letter-spacing: 4px;
      color: #888888;
    }

    /* Main Ticker */
    .ticker-section {
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0a;
      border: 2px solid #00d4ff;
      position: relative;
      overflow: hidden;
      border-radius: 8px;
    }

    .ticker-wrapper {
      width: 100%;
      height: 100%;
      position: relative;
      display: flex;
      align-items: center;
      padding: 0 100px;
    }

    .ticker-content {
      display: flex;
      animation: scroll 18s linear infinite;
      white-space: nowrap;
    }

    .ticker-item {
      display: flex;
      align-items: center;
      gap: 60px;
      margin-right: 200px;
      flex-shrink: 0;
    }

    .ticker-label {
      font-size: 90px;
      font-weight: 900;
      letter-spacing: 6px;
      color: #ffffff;
      text-shadow: 0 0 30px rgba(0, 212, 255, 0.8);
      min-width: max-content;
    }

    .divider-ticker {
      font-size: 60px;
      color: #00d4ff;
      opacity: 0.5;
    }

    @keyframes scroll {
      0% {
        transform: translateX(0);
      }
      100% {
        transform: translateX(-50%);
      }
    }

    /* Footer - 3 Column Grid */
    .footer {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-gap: 60px;
      align-items: center;
    }

    .footer-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px;
      border: 2px solid #00d4ff;
      border-radius: 8px;
      gap: 20px;
    }

    .footer-label {
      font-size: 56px;
      font-weight: 700;
      color: #00d4ff;
      letter-spacing: 3px;
      text-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
    }

    .footer-value {
      font-size: 72px;
      font-weight: 900;
      color: #ffffff;
      letter-spacing: 2px;
      text-align: center;
      text-shadow: 0 0 30px rgba(0, 212, 255, 0.6);
    }

    /* Responsive */
    @media (max-width: 1920px) {
      .signage-container {
        width: 100%;
        height: auto;
        min-height: 100vh;
        grid-template-rows: auto 600px auto;
        grid-gap: 30px;
        padding: 40px;
      }

      .header {
        padding-left: 40px;
        border-left: 8px solid #00d4ff;
      }

      .store-name {
        font-size: 64px;
        letter-spacing: 5px;
        margin-bottom: 10px;
      }

      .store-tagline {
        font-size: 44px;
        letter-spacing: 2px;
      }

      .ticker-section {
        border-width: 1px;
        border-radius: 4px;
      }

      .ticker-wrapper {
        padding: 0 50px;
      }

      .ticker-label {
        font-size: 48px;
        letter-spacing: 3px;
      }

      .divider-ticker {
        font-size: 32px;
      }

      .footer {
        grid-template-columns: repeat(3, 1fr);
        grid-gap: 30px;
      }

      .footer-item {
        padding: 24px;
        border-width: 1px;
        border-radius: 4px;
        gap: 12px;
      }

      .footer-label {
        font-size: 32px;
      }

      .footer-value {
        font-size: 40px;
      }
    }
  </style>
</head>
<body>
  <div class="signage-container">
    <!-- Header -->
    <div class="header">
      <h1 class="store-name">TOKO BUAH ABS</h1>
      <h2 class="store-tagline">Aneka Buah Segar</h2>
    </div>

    <!-- Main Ticker -->
    <div class="ticker-section">
      <div class="ticker-wrapper">
        <div class="ticker-content">
          <div class="ticker-item">
            <span class="ticker-label">BUAH LOKAL</span>
            <span class="divider-ticker">•</span>
            <span class="ticker-label">BUAH IMPORT</span>
            <span class="divider-ticker">•</span>
            <span class="ticker-label">PARCEL BUAH</span>
          </div>
          <div class="ticker-item">
            <span class="ticker-label">BUAH LOKAL</span>
            <span class="divider-ticker">•</span>
            <span class="ticker-label">BUAH IMPORT</span>
            <span class="divider-ticker">•</span>
            <span class="ticker-label">PARCEL BUAH</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Footer Contact -->
    <div class="footer">
      <div class="footer-item">
        <div class="footer-label">LOKASI</div>
        <div class="footer-value">KEPANJEN<br>MALANG</div>
      </div>

      <div class="footer-item">
        <div class="footer-label">WHATSAPP</div>
        <div class="footer-value">081333527527</div>
      </div>

      <div class="footer-item">
        <div class="footer-label">JAM BUKA</div>
        <div class="footer-value">SETIAP HARI<br>BUKA</div>
      </div>
    </div>
  </div>
</body>
</html>
