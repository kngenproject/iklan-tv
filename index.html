<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Berita Terkini — Digital Signage</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="signage-root" id="signage-root">

    <!-- ══ HEADER ══ -->
    <header class="s-header">
        <div class="logo-area">
            <div class="logo-icon">📰</div>
            <div class="logo-text">
                <h1 class="logo-abs"><span>Berita</span>Terkini</h1>
                <div class="logo-tagline">Digital News Network</div>
            </div>
        </div>
        <div class="header-right">
            <div class="header-badge">🔴 LIVE<br>BREAKING</div>
            <div class="clock-box">
                <div class="clock-time" id="jam-tv">00:00:00</div>
                <div class="clock-date" id="tanggal-tv">—</div>
            </div>
        </div>
    </header>

    <!-- ══ MAIN CONTENT ══ -->
    <main class="s-main">

        <!-- PANEL KIRI — SLIDESHOW BERITA (akan diisi oleh JS) -->
        <section class="panel-left" aria-label="Slideshow Berita">
            <div class="slide-dots">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
        </section>

        <!-- PANEL KANAN — SIDEBAR (akan diisi oleh JS) -->
        <aside class="panel-right" aria-label="Info & Layanan">
            <div class="right-top">
                <h3 class="right-top-title">📡 Info Terkini</h3>
                <div class="qr-box">
                    <div class="qr-placeholder">Scan QR<br>Berita Digital</div>
                </div>
                <p class="qr-label">Dapatkan notifikasi berita terbaru</p>
                <div class="kontak-list">
                    <div class="kontak-item">📱 <span>@berita_terkini</span></div>
                    <div class="kontak-item">🌐 <span>beritaterkini.id</span></div>
                    <div class="kontak-item">📧 <span>redaksi@beritaterkini.id</span></div>
                </div>
            </div>
            <div class="right-middle">
                <!-- Akan diisi oleh JS -->
            </div>
        </aside>
    </main>

    <!-- ══ RUNNING TICKER ══ -->
    <footer class="marquee-wrap">
        <div class="marquee-track" id="marquee-track"></div>
    </footer>

    <!-- Toast Notifikasi -->
    <div class="toast" id="toast">📰 Berita diperbarui!</div>

</div>
<script src="app.js"></script>
</body>
</html>
