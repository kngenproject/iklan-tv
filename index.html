<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Toko Buah ABS - Digital Signage</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      overflow: hidden;
    }

    .signage-container {
      width: 3840px;
      height: 2160px;
      background: linear-gradient(135deg, #1a3a1a 0%, #2d5016 50%, #1a3a1a 100%);
      color: white;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 120px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    /* Running Text Section */
    .running-text-section {
      width: 100%;
      margin-bottom: 120px;
    }

    .running-text {
      font-size: 140px;
      font-weight: 700;
      letter-spacing: 8px;
      animation: slideLeft 15s linear infinite;
      white-space: nowrap;
      text-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
      color: #ffffff;
    }

    @keyframes slideLeft {
      0% {
        transform: translateX(3840px);
      }
      100% {
        transform: translateX(-100%);
      }
    }

    /* Elegant Divider */
    .divider {
      width: 80%;
      height: 4px;
      background: linear-gradient(90deg, transparent, #4a7c2c, transparent);
      margin: 80px auto;
    }

    /* Info Section */
    .info-section {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(20px);
      border: 2px solid rgba(255, 255, 255, 0.15);
      border-radius: 40px;
      padding: 100px 150px;
      max-width: 3000px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }

    .info-title {
      font-size: 88px;
      font-weight: 700;
      margin-bottom: 60px;
      letter-spacing: 4px;
      text-shadow: 0 4px 16px rgba(0, 0, 0, 0.4);
    }

    .info-subtitle {
      font-size: 72px;
      font-weight: 500;
      margin-bottom: 80px;
      color: #b8e6b8;
      letter-spacing: 2px;
    }

    /* Features Grid */
    .features {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 80px;
      margin-bottom: 80px;
    }

    .feature-item {
      padding: 40px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      font-size: 48px;
      font-weight: 600;
      letter-spacing: 2px;
      transition: all 0.3s ease;
    }

    .feature-item:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.2);
      transform: translateY(-8px);
    }

    /* Contact Info */
    .contact-info {
      font-size: 56px;
      margin-bottom: 30px;
      font-weight: 600;
      letter-spacing: 2px;
      color: #e8f5e9;
    }

    .contact-phone {
      font-size: 72px;
      margin-bottom: 60px;
      font-weight: 700;
      letter-spacing: 3px;
      color: #4a7c2c;
      text-shadow: 0 4px 12px rgba(74, 124, 44, 0.3);
    }

    .cta-button {
      display: inline-block;
      background: linear-gradient(135deg, #4a7c2c 0%, #5a9c3c 100%);
      color: white;
      padding: 50px 120px;
      font-size: 56px;
      border-radius: 25px;
      border: 2px solid rgba(255, 255, 255, 0.2);
      cursor: pointer;
      font-weight: 700;
      transition: all 0.3s ease;
      box-shadow: 0 16px 48px rgba(74, 124, 44, 0.4);
      letter-spacing: 3px;
    }

    .cta-button:hover {
      background: linear-gradient(135deg, #5a9c3c 0%, #6aac4c 100%);
      transform: translateY(-10px);
      box-shadow: 0 24px 64px rgba(74, 124, 44, 0.6);
      border-color: rgba(255, 255, 255, 0.4);
    }

    /* Responsive */
    @media (max-width: 1920px) {
      .signage-container {
        width: 100%;
        height: auto;
        padding: 60px;
      }

      .running-text {
        font-size: 72px;
        animation: slideLeftMobile 12s linear infinite;
      }

      @keyframes slideLeftMobile {
        0% {
          transform: translateX(1920px);
        }
        100% {
          transform: translateX(-100%);
        }
      }

      .divider {
        margin: 40px auto;
      }

      .info-section {
        padding: 60px 80px;
        border-radius: 24px;
      }

      .info-title {
        font-size: 48px;
        margin-bottom: 30px;
      }

      .info-subtitle {
        font-size: 40px;
        margin-bottom: 40px;
      }

      .features {
        grid-template-columns: repeat(3, 1fr);
        gap: 40px;
        margin-bottom: 40px;
      }

      .feature-item {
        font-size: 28px;
        padding: 24px;
      }

      .contact-info {
        font-size: 32px;
      }

      .contact-phone {
        font-size: 40px;
      }

      .cta-button {
        padding: 28px 64px;
        font-size: 32px;
      }
    }
  </style>
</head>
<body>
  <div class="signage-container">
    <!-- Running Text -->
    <div class="running-text-section">
      <div class="running-text">TOKO BUAH ABS • ANEKA BUAH SEGAR • TOKO BUAH ABS • ANEKA BUAH SEGAR •</div>
    </div>

    <div class="divider"></div>

    <!-- Info Section -->
    <div class="info-section">
      <h1 class="info-title">TOKO BUAH ABS</h1>
      <h2 class="info-subtitle">ANEKA BUAH SEGAR</h2>

      <div class="features">
        <div class="feature-item">Buah Lokal</div>
        <div class="feature-item">Buah Import</div>
        <div class="feature-item">Parcel Buah</div>
      </div>

      <div class="divider"></div>

      <div class="contact-info">KEPANJEN, MALANG</div>
      <div class="contact-phone">081333527527</div>
      <button class="cta-button">HUBUNGI SEKARANG</button>
    </div>
  </div>
</body>
</html>
