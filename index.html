<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iklan Toko Buah ABS</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .container {
            width: 3840px;
            height: 2160px;
            display: flex;
            background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
            position: relative;
            overflow: hidden;
        }

        .content {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
            padding: 200px;
            text-align: center;
            color: white;
        }

        .logo-section {
            margin-bottom: 100px;
        }

        .emoji-fruits {
            font-size: 280px;
            margin-bottom: 60px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-40px); }
        }

        .title {
            font-size: 280px;
            font-weight: 900;
            margin-bottom: 40px;
            text-shadow: 8px 8px 0px rgba(0, 0, 0, 0.3);
            letter-spacing: -15px;
        }

        .tagline {
            font-size: 120px;
            font-weight: 300;
            margin-bottom: 80px;
            opacity: 0.95;
        }

        .info-box {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            padding: 80px 120px;
            border-radius: 60px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            margin: 60px 0;
            max-width: 2400px;
        }

        .address {
            font-size: 90px;
            margin-bottom: 50px;
            font-weight: 600;
        }

        .location-detail {
            font-size: 80px;
            line-height: 1.4;
            opacity: 0.9;
        }

        .cta-button {
            display: inline-block;
            background: #e74c3c;
            color: white;
            padding: 70px 180px;
            font-size: 100px;
            font-weight: bold;
            border-radius: 50px;
            text-decoration: none;
            margin-top: 80px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .cta-button:hover {
            transform: scale(1.05);
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.4);
        }

        .rating {
            font-size: 100px;
            margin-top: 80px;
        }

        .stars {
            color: #f1c40f;
            margin: 0 20px;
        }

        .decorative-shapes {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 0;
        }

        .circle {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
        }

        .circle1 {
            width: 600px;
            height: 600px;
            top: -200px;
            right: -200px;
        }

        .circle2 {
            width: 800px;
            height: 800px;
            bottom: -300px;
            left: -300px;
        }

        .content-wrapper {
            position: relative;
            z-index: 1;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="decorative-shapes">
            <div class="circle circle1"></div>
            <div class="circle circle2"></div>
        </div>

        <div class="content">
            <div class="content-wrapper">
                <div class="logo-section">
                    <div class="emoji-fruits">🍎🍌🍊🥝🍇</div>
                </div>

                <h1 class="title">TOKO BUAH ABS</h1>
                <p class="tagline">Buah Segar Pilihan Terbaik</p>

                <div class="info-box">
                    <div class="address">📍 Jl. Raya Penarukan No.2</div>
                    <div class="location-detail">
                        Kepanjen, Kab. Malang<br>
                        Jawa Timur 65163
                    </div>
                </div>

                <div class="rating">
                    <span class="stars">★★★★★</span>
                </div>

                <button class="cta-button">🛒 Kunjungi Sekarang</button>
            </div>
        </div>
    </div>
</body>
</html>
