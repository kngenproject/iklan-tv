<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>ABS Aneka Buah Segar - Signage</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap');

  * { margin:0; padding:0; box-sizing:border-box; }

  html, body {
    width: 3840px;
    height: 2160px;
    font-family: 'Poppins', sans-serif;
    overflow: hidden;
    background: linear-gradient(135deg, #fff9f0 0%, #fef3e2 100%);
  }

  .stage {
    width: 3840px;
    height: 2160px;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 160px;
  }

  /* decorative soft circles */
  .blob {
    position: absolute;
    border-radius: 50%;
    opacity: 0.12;
  }
  .blob.green { width: 1400px; height: 1400px; background:#3e9b4f; top:-400px; left:-400px; }
  .blob.orange { width: 1200px; height: 1200px; background:#f2994a; bottom:-350px; right:-350px; }

  .logo-row {
    display: flex;
    align-items: center;
    gap: 36px;
    margin-bottom: 40px;
    z-index: 2;
  }
  .logo-row .icon {
    font-size: 110px;
    line-height: 1;
  }
  .brand-name {
    font-size: 128px;
    font-weight: 800;
    color: #2c6e35;
    letter-spacing: 2px;
  }
  .tagline {
    font-size: 52px;
    font-weight: 400;
    color: #5b6b58;
    margin-bottom: 110px;
    z-index: 2;
    text-align: center;
  }

  .info-card {
    background: #ffffff;
    border-radius: 48px;
    box-shadow: 0 30px 80px rgba(0,0,0,0.08);
    padding: 90px 140px;
    display: flex;
    flex-direction: column;
    gap: 64px;
    z-index: 2;
    width: 2400px;
  }

  .info-row {
    display: flex;
    align-items: flex-start;
    gap: 48px;
  }
  .info-row .ico {
    font-size: 70px;
    width: 110px;
    text-align: center;
    flex-shrink: 0;
  }
  .info-row .label {
    font-size: 38px;
    font-weight: 600;
    color: #a0a0a0;
    text-transform: uppercase;
    letter-spacing: 3px;
    margin-bottom: 10px;
  }
  .info-row .value {
    font-size: 54px;
    font-weight: 600;
    color: #333333;
    line-height: 1.4;
  }
  .info-row .value.hours {
    color: #2c6e35;
    font-weight: 700;
  }

  .divider {
    height: 2px;
    background: #f0ede6;
    width: 100%;
  }

  .footer-row {
    margin-top: 100px;
    display: flex;
    align-items: center;
    gap: 28px;
    z-index: 2;
  }
  .footer-row .ig-icon {
    font-size: 48px;
  }
  .footer-row .ig-handle {
    font-size: 46px;
    font-weight: 600;
    color: #444;
  }

  .badge {
    position: absolute;
    top: 120px;
    right: 160px;
    background: #2c6e35;
    color: #fff;
    font-size: 40px;
    font-weight: 700;
    padding: 24px 56px;
    border-radius: 100px;
    letter-spacing: 2px;
    z-index: 3;
  }
</style>
</head>
<body>

<div class="stage">
  <div class="blob green"></div>
  <div class="blob orange"></div>

  <div class="badge">BUKA SETIAP HARI</div>

  <div class="logo-row">
    <span class="icon">🍇</span>
    <span class="brand-name">ABS</span>
    <span class="icon">🍊</span>
  </div>
  <div class="tagline">Aneka Buah Segar — Pilihan Terbaik untuk Keluarga Anda</div>

  <div class="info-card">

    <div class="info-row">
      <div class="ico">📍</div>
      <div>
        <div class="label">Lokasi</div>
        <div class="value">Jl. Raya Penarukan No.2, Kepanjen,<br>Kabupaten Malang, Jawa Timur 65163</div>
      </div>
    </div>

    <div class="divider"></div>

    <div class="info-row">
      <div class="ico">🕒</div>
      <div>
        <div class="label">Jam Operasional</div>
        <div class="value hours">07.00 – 21.00 WIB</div>
      </div>
    </div>

    <div class="divider"></div>

    <div class="info-row">
      <div class="ico">📷</div>
      <div>
        <div class="label">Instagram</div>
        <div class="value">@abskepanjen</div>
      </div>
    </div>

  </div>

  <div class="footer-row">
    <span class="ig-icon">📷</span>
    <span class="ig-handle">@abskepanjen</span>
  </div>
</div>

<audio id="bgm" src="./music.mp3" loop autoplay></audio>

<script>
  // Browser modern memblokir autoplay dengan suara sebelum interaksi user.
  // Untuk perangkat signage (kiosk mode / autoplay policy dimatikan), ini akan langsung play.
  // Fallback: play saat ada interaksi pertama (klik/tap layar), berguna saat testing di browser biasa.
  const audio = document.getElementById('bgm');
  const tryPlay = () => audio.play().catch(()=>{});
  window.addEventListener('load', tryPlay);
  document.addEventListener('click', tryPlay, { once: true });
  document.addEventListener('touchstart', tryPlay, { once: true });
</script>

</body>
</html>
