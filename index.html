<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABS Kepanjen - Toko Buah Aneka Buah Segar</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 3840px;
            height: 2160px;
            background: linear-gradient(135deg, #f5f5f5 0%, #ffffff 100%);
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            width: 100%;
            height: 100%;
            position: relative;
            overflow: hidden;
            background: white;
        }

        /* Dekorasi background */
        .deco-top-left {
            position: absolute;
            top: 0;
            left: 0;
            width: 400px;
            height: 400px;
            background: linear-gradient(135deg, #d4ff3c 0%, #a8ff00 100%);
            border-radius: 0 0 400px 0;
            opacity: 0.9;
            animation: floatDeco 6s ease-in-out infinite;
        }

        .deco-top-right {
            position: absolute;
            top: -100px;
            right: 0;
            width: 500px;
            height: 600px;
            background: linear-gradient(180deg, rgba(180,0,0,0.8) 0%, rgba(200,50,50,0.6) 100%);
            clip-path: polygon(0 0, 60% 0, 40% 100%, 0 100%);
            animation: slideIn 8s ease-in-out infinite;
        }

        .deco-bottom-left {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, #d4ff3c 0%, #a8ff00 100%);
            border-radius: 100px 100px 0 0;
            opacity: 0.7;
            animation: pulse 5s ease-in-out infinite;
        }

        .deco-bottom-right {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 350px;
            height: 350px;
            background: linear-gradient(135deg, #2d7a2d 0%, #1a4d1a 100%);
            border-radius: 350px 0 0 0;
            opacity: 0.8;
            animation: bounce 7s ease-in-out infinite;
        }

        /* Logo section */
        .logo-section {
            position: absolute;
            left: 80px;
            top: 150px;
            width: 500px;
            text-align: center;
            z-index: 10;
            animation: slideInLeft 1s ease-out;
        }

        .logo-circle {
            width: 380px;
            height: 380px;
            margin: 0 auto 30px;
            background: linear-gradient(135deg, #ff4444 0%, #ff6666 50%, #ff9900 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            animation: rotateLogic 20s linear infinite;
        }

        .logo-inner {
            width: 340px;
            height: 340px;
            background: white;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .logo-fruit {
            font-size: 140px;
            line-height: 1;
            margin-bottom: 20px;
            animation: swing 3s ease-in-out infinite;
        }

        .logo-text {
            color: #2d5a2d;
            font-size: 48px;
            font-weight: bold;
            margin: 10px 0;
            font-style: italic;
            animation: fadeInUp 1.2s ease-out;
        }

        .logo-abs {
            color: #d32020;
            font-size: 120px;
            font-weight: bold;
            line-height: 1;
            margin: 10px 0;
            animation: scaleIn 1.5s ease-out;
        }

        .logo-subtitle {
            color: #2d5a2d;
            font-size: 32px;
            margin-top: 15px;
            font-weight: bold;
        }

        .tagline {
            color: #d32020;
            font-size: 36px;
            font-style: italic;
            margin-top: 20px;
            line-height: 1.4;
            animation: fadeInUp 1.4s ease-out 0.3s backwards;
        }

        /* Main content section */
        .main-section {
            position: absolute;
            left: 650px;
            top: 100px;
            width: 3050px;
            height: 900px;
            z-index: 20;
        }

        .header {
            font-size: 140px;
            font-weight: bold;
            color: #d32020;
            margin-bottom: 40px;
            letter-spacing: 8px;
            text-shadow: 4px 4px 0px rgba(0,0,0,0.1);
            animation: slideInRight 1s ease-out;
        }

        .header .green {
            color: #2d7a2d;
            display: block;
            margin-top: 20px;
            letter-spacing: 6px;
        }

        /* Category buttons */
        .categories {
            display: flex;
            gap: 80px;
            margin-bottom: 60px;
            animation: fadeIn 1.2s ease-out 0.6s backwards;
        }

        .category-btn {
            flex: 1;
            border: 5px solid #d32020;
            border-radius: 40px;
            padding: 40px 30px;
            background: white;
            display: flex;
            align-items: center;
            gap: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            min-height: 150px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .category-btn:nth-child(1) {
            border-color: #d32020;
        }

        .category-btn:nth-child(1) .icon {
            background: #d32020;
        }

        .category-btn:nth-child(2) {
            border-color: #2d7a2d;
        }

        .category-btn:nth-child(2) .icon {
            background: #2d7a2d;
        }

        .category-btn:nth-child(3) {
            border-color: #ff9900;
        }

        .category-btn:nth-child(3) .icon {
            background: #ff9900;
        }

        .category-btn:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
        }

        .icon {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 70px;
            color: white;
            flex-shrink: 0;
            animation: bounce 2s ease-in-out infinite;
        }

        .category-text {
            flex: 1;
        }

        .category-text-main {
            color: #d32020;
            font-size: 60px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .category-btn:nth-child(2) .category-text-main {
            color: #2d7a2d;
        }

        .category-btn:nth-child(3) .category-text-main {
            color: #ff9900;
        }

        .category-text-sub {
            color: #333;
            font-size: 50px;
            font-weight: bold;
        }

        /* Promise banner */
        .promise-banner {
            background: linear-gradient(90deg, #2d7a2d 0%, #1a4d1a 100%);
            border-radius: 50px;
            padding: 40px 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 60px;
            color: white;
            font-size: 70px;
            font-weight: bold;
            text-transform: uppercase;
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
            animation: slideInUp 1.2s ease-out 0.8s backwards;
        }

        .promise-item {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .promise-dot {
            width: 30px;
            height: 30px;
            background: #ffcc00;
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
        }

        /* Stock banner */
        .stock-banner {
            position: absolute;
            left: 650px;
            bottom: 300px;
            width: 2950px;
            height: 200px;
            background: linear-gradient(90deg, #d32020 0%, #ff4444 100%);
            border-radius: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 25;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: slideInUp 1.2s ease-out 1s backwards;
        }

        .stock-text {
            color: white;
            font-size: 100px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 8px;
            display: flex;
            align-items: center;
            gap: 40px;
        }

        .stock-icon {
            font-size: 120px;
            animation: bounce 2s ease-in-out infinite;
        }

        /* Footer section */
        .footer {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 280px;
            background: linear-gradient(90deg, #2d5a2d 0%, #1a3a1a 100%);
            display: flex;
            align-items: center;
            justify-content: space-around;
            padding: 40px 80px;
            z-index: 30;
            animation: slideUp 1s ease-out 1.2s backwards;
        }

        .footer-item {
            color: white;
            display: flex;
            align-items: center;
            gap: 30px;
            flex: 1;
        }

        .footer-icon {
            width: 100px;
            height: 100px;
            background: #ffcc00;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            color: #2d5a2d;
            flex-shrink: 0;
        }

        .footer-text {
            font-size: 60px;
            font-weight: bold;
            line-height: 1.2;
        }

        .footer-divider {
            width: 5px;
            height: 150px;
            background: #ffcc00;
            border-radius: 5px;
        }

        .qr-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .qr-box {
            width: 180px;
            height: 180px;
            background: white;
            border-radius: 20px;
            padding: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            animation: scaleIn 1.5s ease-out 1.4s backwards;
        }

        .qr-placeholder {
            width: 150px;
            height: 150px;
            background: linear-gradient(135deg, #333 0%, #555 100%);
            border-radius: 10px;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            padding: 15px;
        }

        .qr-dot {
            background: #333;
            border-radius: 3px;
            animation: fadeInScale 1.5s ease-out;
        }

        .qr-label {
            color: white;
            font-size: 50px;
            font-weight: bold;
            text-align: center;
            letter-spacing: 2px;
        }

        /* Animations */
        @keyframes slideInLeft {
            from {
                opacity: 0;
                transform: translateX(-100px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(100px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(60px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(100px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInScale {
            from {
                opacity: 0;
                transform: scale(0.5);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes rotateLogic {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }

        @keyframes swing {
            0%, 100% {
                transform: rotate(0deg);
            }
            25% {
                transform: rotate(5deg);
            }
            75% {
                transform: rotate(-5deg);
            }
        }

        @keyframes bounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-20px);
            }
        }

        @keyframes floatDeco {
            0%, 100% {
                transform: translate(0, 0);
            }
            50% {
                transform: translate(20px, 20px);
            }
        }

        @keyframes slideIn {
            from {
                transform: translateX(100px);
            }
            to {
                transform: translateX(0);
            }
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
                opacity: 0.7;
            }
            50% {
                transform: scale(1.1);
                opacity: 1;
            }
        }

        /* Reduce motion preference */
        @media (prefers-reduced-motion: reduce) {
            * {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>

</body>
