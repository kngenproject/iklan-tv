<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Toko Buah ABS - Digital Signage</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
    }

    .signage-container {
      width: 3840px;
      height: 2160px;
      background: linear-gradient(135deg, #2d5016 0%, #4a7c2c 100%);
      color: white;
      display: flex;
      flex-direction: column;
      justify-content: space-around;
      align-items: center;
      padding: 120px;
      text-align: center;
    }

    /* Title Section */
    .store-name {
      font-size: 120px;
      font-weight: 700;
      text-shadow: 0 6px 24px rgba(0, 0, 0, 0.4);
      margin-bottom: 20px;
      letter-spacing: 4px;
    }

    .store-tagline {
      font-size: 80px;
      font-weight: 500;
      text-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
      margin-bottom: 100px;
    }

    /* Features Section */
    .features {
      display: flex;
      justify-content: center;
      gap: 150px;
      font-size: 48px;
      margin-bottom: 120px;
      flex-wrap: wrap;
    }

    .feature-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 30px;
    }

    .feature-item .icon {
      font-size: 100px;
      filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.2));
    }

    /* Contact Section */
    .contact-section {
      background: rgba(0, 0, 0, 0.15);
      padding: 80px 120px;
      border-radius: 30px;
      backdrop-filter: blur(10px);
      border: 2px solid rgba(255, 255, 255, 0.2);
    }

    .contact-location {
      font-size: 56px;
      margin-bottom: 40px;
      font-weight: 600;
    }

    .contact-whatsapp {
      font-size: 56px;
      margin-bottom: 60px;
      font-weight: 600;
      letter-spacing: 2px;
    }

    .cta-button {
      display: inline-block;
      background: linear-gradient(135deg, #ff6b35 0%, #ff5a1f 100%);
      color: white;
      padding: 40px 100px;
      font-size: 48px;
      border-radius: 20px;
      border: none;
      cursor: pointer;
      font-weight: 700;
      transition: all 0.3s ease;
      box-shadow: 0 12px 40px rgba(255, 107, 53, 0.4);
      letter-spacing: 2px;
    }

    .cta-button:hover {
      background: linear-gradient(135deg, #ff5a1f 0%, #ff4900 100%);
      transform: translateY(-8px);
      box-shadow: 0 16px 48px rgba(255, 107, 53, 0.6);
    }

    /* Responsive untuk testing */
    @media (max-width: 1920px) {
      .signage-container {
        width: 100%;
        height: auto;
        padding: 60px;
      }

      .store-name {
        font-size: 64px;
      }

      .store-tagline {
        font-size: 48px;
        margin-bottom: 60px;
      }

      .features {
        gap: 80px;
        font-size: 28px;
        margin-bottom: 60px;
      }

      .feature-item .icon {
        font-size: 56px;
      }

      .contact-section {
        padding: 40px 60px;
        border-radius: 16px;
      }

      .contact-location {
        font-size: 36px;
      }

      .contact-whatsapp {
        font-size: 36px;
      }

      .cta-button {
        padding: 24px 64px;
        font-size: 28px;
      }
    }
  </style>
</head>
<body>
  <div class="signage-container">
    <div>
      <h1 class="store-name">TOKO BUAH ABS</h1>
      <h2 class="store-tagline">ANEKA BUAH SEGAR</h2>

      <div class="features">
        <div class="feature-item">
          <span class="icon">🍎</span>
          <span>Buah Lokal</span>
        </div>
        <div class="feature-item">
          <span class="icon">🍌</span>
          <span>Buah Import</span>
        </div>
        <div class="feature-item">
          <span class="icon">🎁</span>
          <span>Parcel Buah</span>
        </div>
      </div>
    </div>

    <div class="contact-section">
      <div class="contact-location">📍 KEPANJEN, MALANG</div>
      <div class="contact-whatsapp">💬 WhatsApp: 081333527527</div>
      <button class="cta-button">HUBUNGI SEKARANG</button>
    </div>
  </div>
</body>
</html>
