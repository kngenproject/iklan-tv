<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toko Buah ABS - Design 2</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Fredoka', sans-serif; }
        .container {
            width: 3840px;
            height: 2160px;
            background: linear-gradient(135deg, #FFD93D 0%, #FF6B6B 50%, #2ecc71 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            padding: 200px;
            text-align: center;
        }
        .fruits-top {
            font-size: 300px;
            margin-bottom: 100px;
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-60px); }
        }
        .title {
            font-size: 350px;
            font-weight: 900;
            color: white;
            text-shadow: 10px 10px 30px rgba(0, 0, 0, 0.3);
            margin-bottom: 40px;
        }
        .tagline {
            font-size: 120px;
            color: white;
            margin-bottom: 100px;
            font-weight: 300;
        }
        .feature-boxes {
            display: flex;
            gap: 80px;
            justify-content: center;
            margin-bottom: 120px;
            flex-wrap: wrap;
        }
        .feature {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(10px);
            padding: 80px 100px;
            border-radius: 50px;
            border: 3px solid rgba(255, 255, 255, 0.5);
            color: white;
            font-size: 80px;
            font-weight: 600;
        }
        .location-box {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            padding: 100px 150px;
            border-radius: 60px;
            border: 3px solid white;
            color: white;
            margin-bottom: 100px;
        }
        .address {
            font-size: 100px;
            font-weight: 700;
            margin-bottom: 30px;
        }
        .detail {
            font-size: 85px;
            opacity: 0.95;
        }
        .btn {
            background: white;
            color: #FF6B6B;
            padding: 80px 200px;
            font-size: 110px;
            font-weight: 900;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
            transition: all 0.3s;
        }
        .btn:hover {
            transform: scale(1.08);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="fruits-top">🍓🍊🍌🥝🍇</div>
        <h1 class="title">ABS</h1>
        <p class="tagline">Toko Buah Terpercaya</p>

        <div class="feature-boxes">
            <div class="feature">✨ Segar 100%</div>
            <div class="feature">🚚 Pengiriman Cepat</div>
            <div class="feature">💯 Berkualitas</div>
        </div>

        <div class="location-box">
            <div class="address">📍 Jl. Raya Penarukan No.2</div>
            <div class="detail">Kepanjen, Kab. Malang, Jawa Timur</div>
        </div>

        <button class="btn">🛍️ BELI SEKARANG</button>
    </div>
</body>
</html>
