<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Toko Buah ABS - Digital Signage</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Arial', sans-serif;
      background: #000000;
      overflow: hidden;
    }

    .signage-container {
      width: 3840px;
      height: 2160px;
      background: linear-gradient(180deg, #0a0e27 0%, #1a1f3a 100%);
      color: white;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 0;
      text-align: center;
      position: relative;
    }

    /* Top Section - Logo & Title */
    .header {
      background: linear-gradient(90deg, #1a1f3a 0%, #0f1428 50%, #1a1f3a 100%);
      padding: 80px 120px;
      border-bottom: 3px solid #00d4ff;
      box-shadow: 0 8px 32px rgba(0, 212, 255, 0.15);
    }

    .header-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 30px;
    }

    .store-name {
      font-size: 140px;
      font-weight: 900;
      letter-spacing: 12px;
      color: #ffffff;
      text-shadow: 0 0 40px rgba(0, 212, 255, 0.6);
      line-height: 1;
    }

    .store-tagline {
      font-size: 100px;
      font-weight: 700;
      letter-spacing: 6px;
      color: #00d4ff;
      text-shadow: 0 0 30px rgba(0, 212, 255, 0.4);
    }

    /* Main Running Text Section */
    .ticker-section {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(90deg, #000000 0%, #0a0e27 50%, #000000 100%);
      position: relative;
      overflow: hidden;
      border-top: 3px solid #00d4ff;
      border-bottom: 3px solid #00d4ff;
      box-shadow: 
        inset 0 0 60px rgba(0, 212, 255, 0.1),
        0 0 60px rgba(0, 212, 255, 0.2);
    }

    .ticker-wrapper {
      width: 100%;
      height: 100%;
      position: relative;
      display: flex;
      align-items: center;
    }

    .ticker-content {
      display: flex;
      animation: scroll 20s linear infinite;
      white-space: nowrap;
      padding: 0 200px;
    }

    .ticker-item {
      display: flex;
      align-items: center;
      gap: 100px;
      margin-right: 200px;
      flex-shrink: 0;
    }

    .ticker-label {
      font-size: 80px;
      font-weight: 900;
      letter-spacing: 8px;
      color: #ffffff;
      text-shadow: 0 0 30px rgba(0, 212, 255, 0.8);
      min-width: max-content;
    }

    .ticker-value {
      font-size: 120px;
      font-weight: 700;
      color: #00ff00;
      text-shadow: 0 0 40px rgba(0, 255, 0, 0.8);
      letter-spacing: 4px;
      min-width: max-content;
    }

    .divider-ticker {
      font-size: 100px;
      color: #00d4ff;
      opacity: 0.6;
      margin: 0 100px;
      font-weight: 300;
    }

    @keyframes scroll {
      0% {
        transform: translateX(0);
      }
      100% {
        transform: translateX(-50%);
      }
    }

    /* Bottom Section - Contact Info */
    .footer {
      background: linear-gradient(90deg, #1a1f3a 0%, #0f1428 50%, #1a1f3a 100%);
      padding: 80px 120px;
      border-top: 3px solid #00d4ff;
      box-shadow: 0 -8px 32px rgba(0, 212, 255, 0.15);
      display: flex;
      justify-content: space-around;
      align-items: center;
    }

    .footer-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .footer-label {
      font-size: 64px;
      font-weight: 700;
      color: #00d4ff;
      letter-spacing: 4px;
      text-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
    }

    .footer-value {
      font-size: 80px;
      font-weight: 900;
      color: #ffffff;
      letter-spacing: 3px;
      text-shadow: 0 0 30px rgba(0, 212, 255, 0.6);
    }

    .footer-divider {
      width: 4px;
      height: 200px;
      background: linear-gradient(180deg, transparent, #00d4ff, transparent);
      opacity: 0.5;
    }

    /* Responsive */
    @media (max-width: 1920px) {
      .signage-container {
        width: 100%;
        height: auto;
        min-height: 100vh;
        flex-wrap: wrap;
      }

      .header {
        padding: 40px 60px;
        border-bottom: 2px solid #00d4ff;
      }

      .store-name {
        font-size: 72px;
        letter-spacing: 6px;
      }

      .store-tagline {
        font-size: 52px;
        letter-spacing: 3px;
      }

      .ticker-section {
        min-height: 600px;
        border-top: 2px solid #00d4ff;
        border-bottom: 2px solid #00d4ff;
      }

      .ticker-label {
        font-size: 44px;
        letter-spacing: 4px;
      }

      .ticker-value {
        font-size: 64px;
        letter-spacing: 2px;
      }

      .divider-ticker {
        font-size: 52px;
        margin: 0 50px;
      }

      .footer {
        padding: 40px 60px;
        border-top: 2px solid #00d4ff;
        flex-direction: column;
        gap: 40px;
      }

      .footer-item {
        gap: 12px;
      }

      .footer-label {
        font-size: 36px;
      }

      .footer-value {
        font-size: 44px;
      }

      .footer-divider {
        width: 2px;
        height: 100px;
      }
    }
  </style>
</head>
<body>
  <div class="signage-container">
    <!-- Header -->
    <div class="header">
      <div class="header-content">
        <h1 class="store-name">TOKO BUAH ABS</h1>
        <h2 class="store-tagline">ANEKA BUAH SEGAR</h2>
      </div>
    </div>

    <!-- Main Ticker -->
    <div class="ticker-section">
      <div class="ticker-wrapper">
        <div class="ticker-content">
          <div class="ticker-item">
            <span class="ticker-label">BUAH LOKAL</span>
            <span class="divider-ticker">•</span>
            <span class="ticker-value">SEGAR TERBAIK</span>
          </div>
          <div class="ticker-item">
            <span class="ticker-label">BUAH IMPORT</span>
            <span class="divider-ticker">•</span>
            <span class="ticker-value">BERKUALITAS PREMIUM</span>
          </div>
          <div class="ticker-item">
            <span class="ticker-label">PARCEL BUAH</span>
            <span class="divider-ticker">•</span>
            <span class="ticker-value">HADIAH ISTIMEWA</span>
          </div>
          <!-- Duplicate untuk loop seamless -->
          <div class="ticker-item">
            <span class="ticker-label">BUAH LOKAL</span>
            <span class="divider-ticker">•</span>
            <span class="ticker-value">SEGAR TERBAIK</span>
          </div>
          <div class="ticker-item">
            <span class="ticker-label">BUAH IMPORT</span>
            <span class="divider-ticker">•</span>
            <span class="ticker-value">BERKUALITAS PREMIUM</span>
          </div>
          <div class="ticker-item">
            <span class="ticker-label">PARCEL BUAH</span>
            <span class="divider-ticker">•</span>
            <span class="ticker-value">HADIAH ISTIMEWA</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Footer Contact -->
    <div class="footer">
      <div class="footer-item">
        <div class="footer-label">LOKASI</div>
        <div class="footer-value">KEPANJEN, MALANG</div>
      </div>

      <div class="footer-divider"></div>

      <div class="footer-item">
        <div class="footer-label">WHATSAPP</div>
        <div class="footer-value">081333527527</div>
      </div>

      <div class="footer-divider"></div>

      <div class="footer-item">
        <div class="footer-label">STATUS</div>
        <div class="footer-value">BUKA SETIAP HARI</div>
      </div>
    </div>
  </div>
</body>
</html>
